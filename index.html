<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0F6E56" />
<title>CatFish Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: #0F6E56; --green-dark: #085041; --green-light: #E1F5EE;
    --red: #C0392B; --red-light: #FCEBEB;
    --blue: #185FA5; --bg: #F5F7F5; --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08); --text: #1A1A18; --text3: #9A9A94;
    --radius: 14px; --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100dvh; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  
  #login-screen { position: fixed; inset: 0; background: var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
  #login-screen.hidden { display: none; }
  .login-card { background: #fff; border-radius: 20px; padding: 24px; width: 100%; max-width: 340px; }
  .l-input { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid #ddd; margin-bottom: 10px; font-size: 16px; }
  
  #app { display: flex; flex-direction: column; height: 100%; }
  #app.hidden { display: none; }
  .topbar { background: var(--green); color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .content { flex: 1; overflow-y: auto; padding-bottom: 100px; }

  /* Metrics */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 14px; }
  .metric-card { background: #fff; border-radius: var(--radius); padding: 12px; border: 1px solid var(--border); }
  .mc-label { font-size: 11px; color: var(--text3); }
  .mc-val { font-size: 20px; font-weight: 600; }
  .mc-val.g { color: var(--green); } .mc-val.r { color: var(--red); }

  /* Bars */
  .bar-wrap { padding: 12px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bar-track { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.5s; }

  /* Entries */
  .card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); margin: 10px 14px; overflow: hidden; }
  .card-hd { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; }
  .entry-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .entry-ico { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
  .entry-info { flex: 1; }
  .entry-amt { font-weight: 600; }
  .entry-amt.neg { color: var(--red); } .entry-amt.pos { color: var(--green); }

  /* Nav */
  .nav { display: flex; background: #fff; border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; right: 0; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; padding: 12px 0; border: none; background: none; color: #999; font-size: 10px; text-align: center; }
  .nav-btn.active { color: var(--green); }

  /* Modals */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; }
  .fg { margin-bottom: 15px; }
  .fg label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
  .fg input, .fg select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
  .fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--green); color: #fff; font-size: 30px; border: none; z-index: 100; }
  #receipt-viewer-img { width: 100%; border-radius: 12px; margin-top: 10px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h3 style="margin-bottom:15px">CatFish Login</h3>
    <input class="l-input" id="login-email" type="email" placeholder="Email" />
    <input class="l-input" id="login-password" type="password" placeholder="Password" />
    <button class="btn-g" style="width:100%; background:var(--green); color:#fff; padding:12px; border:none; border-radius:8px" onclick="doLogin()">Sign In</button>
    <div id="login-error" style="color:var(--red); font-size:12px; margin-top:10px; text-align:center"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <span>🐟 CatFish Manager</span>
    <span class="topbar-user" id="user-label" onclick="doLogout()">Sign out</span>
  </div>

  <div class="content">
    <div id="screen-dashboard" class="screen active">
      <div class="metrics-grid">
        <div class="metric-card"><div class="mc-label">Net Profit</div><div class="mc-val g" id="d-profit">₱0</div></div>
        <div class="metric-card"><div class="mc-label">Expenses</div><div class="mc-val r" id="d-expenses">₱0</div></div>
        <div class="metric-card"><div class="mc-label">Capital</div><div class="mc-val b" id="d-capital">₱0</div></div>
        <div class="metric-card"><div class="mc-label">Entries</div><div class="mc-val" id="d-entries">0</div></div>
      </div>
      <div class="card">
        <div class="card-hd">Expense Categories</div>
        <div id="expense-bars"></div>
      </div>
      <div class="card">
        <div class="card-hd">Recent Entries</div>
        <div id="recent-list"></div>
      </div>
    </div>

    <div id="screen-expenses" class="screen">
      <div id="expense-list"></div>
    </div>

    <div id="screen-capital" class="screen">
      <div id="capital-list"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" data-s="dashboard">Dashboard</button>
    <button class="nav-btn" data-s="expenses">Expenses</button>
    <button class="nav-btn" data-s="capital">Capital</button>
  </nav>
</div>

<button class="fab" id="fab" onclick="openEntryModal()">+</button>

<div class="modal-overlay" id="modal-entry">
  <div class="modal-sheet">
    <div class="fg"><label>Type</label><select id="e-type" onchange="onTypeChange()"><option value="expense">Expense</option><option value="income">Income</option><option value="capital">Capital</option></select></div>
    <div class="fg"><label>Description</label><input id="e-desc" /></div>
    <div class="fg" id="cat-fg"><label>Category</label><select id="e-cat"><option value="feeds">Feeds</option><option value="labor">Labor</option><option value="electricity">Electricity</option><option value="other">Other</option></select></div>
    <div class="fg"><label>Amount (₱)</label><input id="e-amount" type="number" inputmode="decimal" /></div>
    <div class="fg"><label>Date</label><input id="e-date" type="date" /></div>
    <div class="fg"><label>Receipt</label><input type="file" id="file-inp" accept="image/*" onchange="onFilePick(event)" /></div>
    <button class="btn-g" id="save-btn" onclick="saveEntry()" style="width:100%; background:var(--green); color:#fff; padding:15px; border:none; border-radius:8px">Save Entry</button>
    <button onclick="closeModal('modal-entry')" style="width:100%; margin-top:10px; background:none; border:none; color:#666">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="modal-receipt">
  <div class="modal-sheet">
    <h3 id="rv-title">Entry Details</h3>
    <div id="rv-info" style="margin:10px 0; font-size:14px; line-height:1.6"></div>
    <img id="receipt-viewer-img" src="" style="display:none" />
    <button class="btn-g" onclick="closeModal('modal-receipt')" style="width:100%; margin-top:15px; background:#eee; color:#333; border:none; padding:12px; border-radius:8px">Close</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBWCx4Xpw3ZkSSVjE7c8WCOvitssWunufQ",
  authDomain: "catfish-business.firebaseapp.com",
  projectId: "catfish-business",
  storageBucket: "catfish-business.appspot.com",
  messagingSenderId: "1019229341744",
  appId: "1:1019229341744:web:ae112945e73866a2e805f5"
};

let app, auth, db, entries = [], pendingFile = null;

const CAT = {
  feeds: { bg: '#E1F5EE', icon: '🌾', bar: '#1D9E75' },
  labor: { bg: '#EEEDFE', icon: '👷', bar: '#7F77DD' },
  electricity: { bg: '#FAEEDA', icon: '⚡', bar: '#EF9F27' },
  other: { bg: '#F1EFE8', icon: '📦', bar: '#888780' },
  income: { bg: '#EAF3DE', icon: '💵', bar: '#639922' },
  capital: { bg: '#E1F5EE', icon: '🏦', bar: '#085041' }
};

// Formatting
const fmt = (n) => '₱' + (Number(n) || 0).toLocaleString('en-PH', { minimumFractionDigits: 2 });
const showToast = (m) => { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); };

function render() {
  const ex = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
  const inc = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
  const cap = entries.filter(e => e.type === 'capital').reduce((s, e) => s + e.amount, 0);
  
  document.getElementById('d-profit').textContent = fmt(inc - ex);
  document.getElementById('d-expenses').textContent = fmt(ex);
  document.getElementById('d-capital').textContent = fmt(cap);
  document.getElementById('d-entries').textContent = entries.length;

  renderBars(ex);
  renderList('recent-list', entries.slice(0, 6));
  renderList('expense-list', entries.filter(e => e.type === 'expense'));
  renderList('capital-list', entries.filter(e => e.type !== 'expense'));
}

function renderBars(totalEx) {
  const el = document.getElementById('expense-bars');
  const counts = {};
  entries.filter(e => e.type === 'expense').forEach(e => counts[e.category] = (counts[e.category] || 0) + e.amount);
  
  el.innerHTML = Object.keys(counts).map(c => {
    const pct = totalEx > 0 ? (counts[c] / totalEx * 100) : 0;
    return `<div class="bar-wrap">
      <div style="font-size:12px; display:flex; justify-content:space-between"><span>${CAT[c].icon} ${c}</span> <span>${fmt(counts[c])}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${CAT[c].bar}"></div></div>
    </div>`;
  }).join('') || '<div style="padding:20px; text-align:center; color:#999">No data</div>';
}

function renderList(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = list.map(e => {
    const info = e.type === 'expense' ? CAT[e.category] : CAT[e.type];
    return `<div class="entry-row" onclick="viewReceipt('${e.id}')">
      <div class="entry-ico" style="background:${info?.bg || '#eee'}">${info?.icon || '❓'}</div>
      <div class="entry-info">
        <div style="font-weight:500; font-size:14px">${e.description}</div>
        <div style="font-size:11px; color:#999">${e.date}</div>
      </div>
      <div class="entry-amt ${e.type === 'expense' ? 'neg' : 'pos'}">${e.type === 'expense' ? '-' : '+'}${fmt(e.amount)}</div>
    </div>`;
  }).join('') || '<div class="empty">No entries</div>';
}

window.viewReceipt = (id) => {
  const e = entries.find(x => x.id === id);
  if(!e) return;
  document.getElementById('rv-title').textContent = e.description;
  document.getElementById('rv-info').innerHTML = `<b>Date:</b> ${e.date}<br><b>Amount:</b> ${fmt(e.amount)}<br><b>Type:</b> ${e.type}`;
  const img = document.getElementById('receipt-viewer-img');
  if(e.receipt) { img.src = e.receipt; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('modal-receipt').classList.add('open');
};

window.onFilePick = (ev) => {
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX) { h *= MAX/w; w = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      pendingFile = canvas.toDataURL('image/jpeg', 0.6);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveEntry = async () => {
  const amount = parseFloat(document.getElementById('e-amount').value);
  const desc = document.getElementById('e-desc').value;
  const date = document.getElementById('e-date').value;
  if(!desc || !amount || !date) return showToast("Fill all fields");

  document.getElementById('save-btn').disabled = true;
  try {
    await db.collection('entries').add({
      type: document.getElementById('e-type').value,
      description: desc,
      amount: amount,
      date: date,
      category: document.getElementById('e-cat').value,
      receipt: pendingFile,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal('modal-entry');
    showToast("Success!");
  } catch(e) { showToast(e.message); }
  document.getElementById('save-btn').disabled = false;
};

window.doLogin = () => auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-password').value).catch(e => document.getElementById('login-error').textContent = e.message);
window.doLogout = () => auth.signOut();
window.onTypeChange = () => document.getElementById('cat-fg').style.display = document.getElementById('e-type').value === 'expense' ? 'block' : 'none';
window.openEntryModal = () => { document.getElementById('e-date').value = new Date().toLocaleDateString('en-CA'); document.getElementById('modal-entry').classList.add('open'); };
window.closeModal = (id) => { document.getElementById(id).classList.remove('open'); pendingFile = null; };

// Firebase Init
app = firebase.initializeApp(FIREBASE_CONFIG);
auth = firebase.auth();
db = firebase.firestore();
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    db.collection('entries').orderBy('date', 'desc').onSnapshot(s => {
      entries = s.docs.map(d => ({id: d.id, ...d.data()}));
      render();
    });
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => {
  document.querySelectorAll('.nav-btn, .screen').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('screen-' + b.dataset.s).classList.add('active');
});
</script>
</body>
</html>
